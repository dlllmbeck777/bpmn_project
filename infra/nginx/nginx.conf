worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Logging
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent"'
    '}';
    access_log /var/log/nginx/access.log json_combined;

    # Security
    client_max_body_size 5m;
    server_tokens off;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            proxy_pass http://admin-ui:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /flowable-ui {
            return 302 /flowable-modeler/$is_args$args;
        }

        location = /flowable-ui/ {
            return 302 /flowable-modeler/$is_args$args;
        }

        location = /flowable-ui/index.html {
            return 302 /flowable-modeler/$is_args$args;
        }

        location ~ ^/flowable-ui/index\.html/(.*)$ {
            return 302 /flowable-modeler/$1$is_args$args;
        }

        location = /flowable-task {
            return 302 /flowable-task/$is_args$args;
        }

        location = /flowable-task/index.html {
            return 302 /flowable-task/$is_args$args;
        }

        location /flowable-task/ {
            proxy_pass http://flowable-ui:8080/flowable-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Prefix /flowable-task;
            proxy_redirect off;
        }

        location = /flowable-idm {
            return 302 /flowable-idm/$is_args$args;
        }

        location = /flowable-idm/index.html {
            return 302 /flowable-idm/$is_args$args;
        }

        location /flowable-idm/ {
            proxy_pass http://flowable-ui:8080/flowable-ui/idm/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Prefix /flowable-idm;
            proxy_redirect off;
        }

        location = /flowable-admin {
            return 302 /flowable-admin/$is_args$args;
        }

        location = /flowable-admin/index.html {
            return 302 /flowable-admin/$is_args$args;
        }

        location /flowable-admin/ {
            proxy_pass http://flowable-ui:8080/flowable-ui/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Prefix /flowable-admin;
            proxy_redirect off;
        }

        location = /flowable-modeler {
            return 302 /flowable-modeler/$is_args$args;
        }

        location = /flowable-modeler/index.html {
            return 302 /flowable-modeler/$is_args$args;
        }

        location /flowable-modeler/ {
            proxy_pass http://flowable-ui:8080/flowable-ui/modeler/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;
            proxy_set_header X-Forwarded-Prefix /flowable-modeler;
            proxy_redirect off;
        }

        location /api/v1/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://core-api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://core-api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /mock-bureaus/ {
            proxy_pass http://mock-bureaus:8110/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /health {
            proxy_pass http://core-api:8000;
        }

        location /metrics {
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;
            proxy_pass http://core-api:8000;
        }

        location /internal/ {
            deny all;
            return 403;
        }

        location /flowable-rest/ {
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;
            proxy_pass http://flowable-rest:8080/flowable-rest/;
        }

        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /grafana;
        }
    }
}
