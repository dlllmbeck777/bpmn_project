services:
  # ── Config Database ───────────────────────────────────
  config-db:
    image: postgres:15
    container_name: config-db
    environment:
      POSTGRES_DB: config
      POSTGRES_USER: config
      POSTGRES_PASSWORD: config
    ports:
      - "5433:5432"
    volumes:
      - config_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks: [db]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U config"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Core API ──────────────────────────────────────────
  core-api:
    build: ./core-api
    container_name: core-api
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=config-db
      - DB_PORT=5432
      - DB_NAME=config
      - DB_USER=config
      - DB_PASSWORD=config
      - GATEWAY_API_KEY=${GATEWAY_API_KEY:-}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-${GATEWAY_API_KEY:-}}
      - SENIOR_ANALYST_API_KEY=${SENIOR_ANALYST_API_KEY:-${ADMIN_API_KEY:-${GATEWAY_API_KEY:-}}}
      - ANALYST_API_KEY=${ANALYST_API_KEY:-${SENIOR_ANALYST_API_KEY:-${ADMIN_API_KEY:-${GATEWAY_API_KEY:-}}}}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
      - FLOWABLE_PASSWORD=${FLOWABLE_PASSWORD:-test}
      - FLOWABLE_PASSWORD_FALLBACKS=${FLOWABLE_PASSWORD_FALLBACKS:-test}
      - CREDIT_BACKEND_DEFAULT_URL=${CREDIT_BACKEND_DEFAULT_URL:-http://18.119.38.114}
      - CREDIT_BACKEND_TIMEOUT_MS=${CREDIT_BACKEND_TIMEOUT_MS:-15000}
      - ADMIN_LOGIN_USERNAME=${ADMIN_LOGIN_USERNAME:-admin}
      - ADMIN_LOGIN_PASSWORD=${ADMIN_LOGIN_PASSWORD:-admin}
      - SENIOR_ANALYST_LOGIN_USERNAME=${SENIOR_ANALYST_LOGIN_USERNAME:-senior}
      - SENIOR_ANALYST_LOGIN_PASSWORD=${SENIOR_ANALYST_LOGIN_PASSWORD:-senior}
      - ANALYST_LOGIN_USERNAME=${ANALYST_LOGIN_USERNAME:-analyst}
      - ANALYST_LOGIN_PASSWORD=${ANALYST_LOGIN_PASSWORD:-analyst}
      - SNP_EXTERNAL_URL=${SNP_EXTERNAL_URL:-}
      - ENCRYPT_KEY=${ENCRYPT_KEY:-change-me-in-production-32chars!}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - RATE_LIMIT_PER_MIN=120
      - SERVICE_NAME=core-api
    depends_on:
      config-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [frontend, backend, db, flowable]

  # ── Processors ────────────────────────────────────────
  processors:
    build: ./processors
    container_name: processors
    ports:
      - "8105:8105"
      - "8106:8106"
      - "8107:8107"
    environment:
      - CONFIG_SERVICE_URL=http://core-api:8000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
    depends_on:
      core-api:
        condition: service_healthy
    restart: unless-stopped
    networks: [backend]
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:8105/health && curl -sf http://localhost:8106/health && curl -sf http://localhost:8107/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Orchestrators ─────────────────────────────────────
  orchestrators:
    build: ./orchestrators
    container_name: orchestrators
    ports:
      - "8011:8011"
      - "8012:8012"
    environment:
      - CONFIG_SERVICE_URL=http://core-api:8000
      - FLOWABLE_PASSWORD=${FLOWABLE_PASSWORD:-test}
      - FLOWABLE_PASSWORD_FALLBACKS=${FLOWABLE_PASSWORD_FALLBACKS:-test}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
      - FLOWABLE_AUTO_DEPLOY_BPMN=${FLOWABLE_AUTO_DEPLOY_BPMN:-true}
      - FLOWABLE_WATCH_TIMEOUT_SECONDS=${FLOWABLE_WATCH_TIMEOUT_SECONDS:-90}
      - FLOWABLE_WATCH_POLL_SECONDS=${FLOWABLE_WATCH_POLL_SECONDS:-2}
    volumes:
      - ./processes:/processes:ro
    depends_on:
      core-api:
        condition: service_healthy
      flowable-rest:
        condition: service_healthy
    restart: unless-stopped
    networks: [backend, flowable]
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:8011/health && curl -sf http://localhost:8012/health && curl -sf -u admin:${FLOWABLE_PASSWORD:-test} http://flowable-rest:8080/flowable-rest/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Connectors ────────────────────────────────────────
  isoftpull:
    build: ./connectors/isoftpull
    container_name: isoftpull
    ports:
      - "8101:8101"
    environment:
      - CONFIG_SERVICE_URL=http://core-api:8000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
      - CREDIT_BACKEND_DEFAULT_URL=${CREDIT_BACKEND_DEFAULT_URL:-http://18.119.38.114}
    restart: unless-stopped
    networks: [backend]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8101/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  creditsafe:
    build: ./connectors/creditsafe
    container_name: creditsafe
    ports:
      - "8102:8102"
    environment:
      - CONFIG_SERVICE_URL=http://core-api:8000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
      - CREDIT_BACKEND_DEFAULT_URL=${CREDIT_BACKEND_DEFAULT_URL:-http://18.119.38.114}
    restart: unless-stopped
    networks: [backend]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8102/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  plaid:
    build: ./connectors/plaid
    container_name: plaid
    ports:
      - "8103:8103"
    environment:
      - CONFIG_SERVICE_URL=http://core-api:8000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
      - CREDIT_BACKEND_DEFAULT_URL=${CREDIT_BACKEND_DEFAULT_URL:-http://18.119.38.114}
    restart: unless-stopped
    networks: [backend]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8103/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ── Flowable Engine ───────────────────────────────────
  mock-bureaus:
    build: ./connectors/mock-bureaus
    container_name: mock-bureaus
    ports:
      - "8110:8110"
    environment:
      - MOCK_PUBLIC_BASE_URL=${MOCK_PUBLIC_BASE_URL:-http://localhost:8110}
      - MOCK_UPSTREAM_LABEL=${MOCK_UPSTREAM_LABEL:-http://18.119.38.114}
    restart: unless-stopped
    networks: [backend]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8110/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  flowable-db:
    image: postgres:15
    container_name: flowable-db
    environment:
      POSTGRES_DB: flowable
      POSTGRES_USER: flowable
      POSTGRES_PASSWORD: ${FLOWABLE_DB_PASSWORD:-flowable}
    ports:
      - "5434:5432"
    volumes:
      - flowable_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks: [flowable]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowable"]
      interval: 5s
      timeout: 3s
      retries: 5

  flowable-rest:
    image: flowable/flowable-rest:6.8.0
    container_name: flowable-rest
    ports:
      - "8085:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://flowable-db:5432/flowable
      - SPRING_DATASOURCE_USERNAME=flowable
      - SPRING_DATASOURCE_PASSWORD=${FLOWABLE_DB_PASSWORD:-flowable}
      - SPRING_DATASOURCE_DRIVER-CLASS-NAME=org.postgresql.Driver
      - SERVER_FORWARD_HEADERS_STRATEGY=framework
      - FLOWABLE_COMMON_APP_IDM-ADMIN_USER=admin
      - FLOWABLE_COMMON_APP_IDM-ADMIN_PASSWORD=${FLOWABLE_PASSWORD:-test}
      - FLOWABLE_ASYNC_EXECUTOR_ACTIVATE=true
      - "JAVA_TOOL_OPTIONS=${FLOWABLE_REST_JAVA_TOOL_OPTIONS:--Xms384m -Xmx1024m -XX:MaxMetaspaceSize=384m -XX:+ExitOnOutOfMemoryError}"
    depends_on:
      - flowable-db
    restart: unless-stopped
    networks: [flowable, backend]
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --user=admin --password=${FLOWABLE_PASSWORD:-test} -q -O /dev/null http://localhost:8080/flowable-rest/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  flowable-ui:
    image: flowable/flowable-ui:6.8.0
    container_name: flowable-ui
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://flowable-db:5432/flowable
      - SPRING_DATASOURCE_USERNAME=flowable
      - SPRING_DATASOURCE_PASSWORD=${FLOWABLE_DB_PASSWORD:-flowable}
      - SPRING_DATASOURCE_DRIVER-CLASS-NAME=org.postgresql.Driver
      - FLOWABLE_COMMON_APP_IDM-ADMIN_USER=admin
      - FLOWABLE_COMMON_APP_IDM-ADMIN_PASSWORD=${FLOWABLE_PASSWORD:-test}
      - FLOWABLE_ASYNC_EXECUTOR_ACTIVATE=true
      - SERVER_FORWARD_HEADERS_STRATEGY=framework
      - "JAVA_TOOL_OPTIONS=${FLOWABLE_UI_JAVA_TOOL_OPTIONS:--Xms512m -Xmx1024m -XX:MaxMetaspaceSize=384m -XX:+ExitOnOutOfMemoryError}"
    depends_on:
      - flowable-db
    restart: unless-stopped
    networks: [flowable]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/flowable-ui/index.html"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s

  # ── Admin UI ──────────────────────────────────────────
  admin-ui:
    build: ./admin-ui
    container_name: admin-ui
    ports:
      - "3000:3000"
    depends_on:
      core-api:
        condition: service_healthy
    restart: unless-stopped
    networks: [frontend]

  # ── Observability ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - core-api
    restart: unless-stopped
    networks: [monitoring, backend]

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks: [monitoring]
volumes:
  config_db_data:
  flowable_db_data:
  grafana_data:

networks:
  frontend:
  backend:
  db:
  flowable:
  monitoring:
